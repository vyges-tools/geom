# Tag a release. vyges-geom is a LIBRARY crate consumed by git tag (vyges-layout
# pins it), so a release is a validated git tag + GitHub Release — no binaries to
# package. Triggers on a pushed tag `v*`, or a manual run with an explicit tag.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: tag release (library crate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches crate version
        run: |
          want="${{ inputs.tag || github.ref_name }}"; want="${want#v}"
          have="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          [ "$want" = "$have" ] || { echo "::error::tag v$want != Cargo.toml version $have — bump [package] version"; exit 1; }
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify build & test at the tag
        run: cargo test --locked --verbose
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
